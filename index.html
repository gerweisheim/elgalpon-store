<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>El Galpón — Tienda Online</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23111111'/><polygon points='5,56 50,12 95,56' fill='%23FF6B35'/><rect x='12' y='56' width='76' height='32' rx='3' fill='%23FF6B35'/><text x='50' y='78' font-size='22' font-weight='900' font-family='Arial' fill='white' text-anchor='middle'>GALPON</text></svg>">
    
    <style>
        :root {
            --naranja: #FF6B35;
            --negro: #111111;
            --gris-l: #f4f4f4;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: var(--gris-l); color: var(--negro); padding-bottom: 80px; }

        /* Header y Estilos Generales */
        header { background: var(--negro); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        /* Buscador */
        .search-container { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        #searchInput:focus { border-color: var(--naranja); }

        /* Grid de Productos */
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; 
        }

        .product-card { 
            background: white; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:active { transform: scale(0.98); }

        .img-container { width: 100%; aspect-ratio: 1/1; background: #eee; position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }

        .product-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; height: 36px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .product-price { color: var(--naranja); font-size: 18px; font-weight: 800; margin-top: auto; }

        /* Botón comprar en tarjeta */
        .btn-add-quick {
            background: var(--negro);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 6px;
            margin-top: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        /* Barra Inferior del Carrito */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            color: white;
            padding: 12px 20px;
            z-index: 1000;
            display: none; /* Se activa con JS */
            box-shadow: 0 -4px 15px rgba(0,0,0,0.3);
        }

        .bar-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; }
        .bar-total { color: var(--naranja); font-size: 18px; }
        
        .progress-bg { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .progress-fill { height: 100%; background: var(--naranja); width: 0%; transition: width 0.4s; }
        
        .bar-msg { font-size: 11px; color: #aaa; text-align: center; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Estilos del Modal */
        #modalOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; }
        .modal-content { background:white; width:90%; max-width:500px; border-radius:15px; position:relative; overflow:hidden; }
        .close-modal { position:absolute; top:10px; right:15px; font-size:30px; cursor:pointer; z-index:10; }
        .modal-body { padding: 20px; }
    </style>
</head>
<body>

<header>
    <h1>EL GALPÓN</h1>
    <p style="font-size: 12px; opacity: 0.8;">Todo lo que buscás, en un solo lugar</p>
</header>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="¿Qué estás buscando hoy?">
    </div>

    <div id="productsGrid" class="products-grid">
        </div>
</div>

<div id="cartBar" class="cart-bar">
    <div class="bar-header">
        <span id="barTotalText">Subtotal: $0</span>
        <span id="barRemainingText">Faltan $40.000</span>
    </div>
    <div class="progress-bg">
        <div id="barFill" class="progress-fill"></div>
    </div>
    <div id="barPromoMsg" class="bar-msg">Mínimo de compra para envío: $40.000</div>
</div>

<div id="modalOverlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalContentInner"></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyWqGk3m-68A8z6Xv-eI-vS8tVvW8l8y-8l-8l/exec'; // Reemplaza con tu URL de Code.gs
    const MIN_PURCHASE = 40000;
    let allProducts = [];
    let cart = JSON.parse(localStorage.getItem('galpon_cart')) || [];

    // Cargar productos
    async function loadProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Cargando catálogo...</p>';
        
        try {
            const response = await fetch(`${API_URL}?action=getProducts`);
            const data = await response.json();
            allProducts = data;
            renderProducts(allProducts);
            updateCartUI();
        } catch (error) {
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">Error al cargar productos. Por favor reintenta.</p>';
        }
    }

    function renderProducts(products) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = '';

        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.onclick = () => openModal(p);

            card.innerHTML = `
                <div class="img-container">
                    <img src="${p.imagen || 'https://via.placeholder.com/200'}" alt="${p.nombre}">
                </div>
                <div class="product-info">
                    <div class="product-title">${p.nombre}</div>
                    <div class="product-price">$${p.precio.toLocaleString()}</div>
                    <button class="btn-add-quick" onclick="quickAdd(event, ${p.codigo})">COMPRAR</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // AGREGADO RÁPIDO - FIX: Evita abrir el modal
    function quickAdd(event, code) {
        event.stopPropagation(); // ¡ESTO EVITA QUE SE ABRA EL MODAL!
        const product = allProducts.find(p => p.codigo == code);
        if (product) {
            addToCart(product);
            
            // Efecto visual simple en el botón
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "¡AGREGADO!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "#111";
            }, 800);
        }
    }

    function addToCart(product) {
        const existing = cart.find(item => item.codigo === product.codigo);
        if (existing) {
            existing.cantidad += 1;
        } else {
            cart.push({ ...product, cantidad: 1 });
        }
        saveCart();
        updateCartUI();
    }

    function saveCart() {
        localStorage.setItem('galpon_cart', JSON.stringify(cart));
    }

    function updateCartUI() {
        const bar = document.getElementById('cartBar');
        const total = cart.reduce((acc, item) => acc + (item.precio * item.cantidad), 0);

        if (cart.length === 0) {
            bar.style.display = 'none';
            return;
        }

        bar.style.display = 'block';
        document.getElementById('barTotalText').innerText = `Subtotal: $${total.toLocaleString()}`;
        
        const porcentaje = Math.min((total / MIN_PURCHASE) * 100, 100);
        document.getElementById('barFill').style.width = porcentaje + '%';

        const remainingText = document.getElementById('barRemainingText');
        const promoMsg = document.getElementById('barPromoMsg');

        if (total < MIN_PURCHASE) {
            remainingText.innerText = `Faltan $${(MIN_PURCHASE - total).toLocaleString()}`;
            promoMsg.innerText = "Mínimo de compra para envío: $40.000";
            promoMsg.style.color = "#aaa";
        } else {
            remainingText.innerText = "¡Mínimo alcanzado!";
            remainingText.style.color = "#4caf50";
            
            if (total >= 100000) {
                promoMsg.innerText = "¡NIVEL 2: TENÉS 5% DE DESCUENTO EXTRA!";
                promoMsg.style.color = var(--naranja);
            } else {
                promoMsg.innerText = "¡Ya puedes realizar tu pedido!";
            }
        }
    }

    // Modal
    function openModal(p) {
        const modal = document.getElementById('modalOverlay');
        const inner = document.getElementById('modalContentInner');
        inner.innerHTML = `
            <img src="${p.imagen}" style="width:100%; height:250px; object-fit:cover;">
            <div class="modal-body">
                <h2>${p.nombre}</h2>
                <p style="color:#666; margin: 10px 0;">${p.descripcion || 'Sin descripción disponible.'}</p>
                <p style="font-size:24px; font-weight:800; color:var(--naranja);">$${p.precio.toLocaleString()}</p>
                <button onclick="addToCartByCode(${p.codigo})" style="width:100%; background:var(--negro); color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; margin-top:15px;">AGREGAR AL CARRITO</button>
            </div>
        `;
        modal.style.display = 'flex';
    }

    function addToCartByCode(code) {
        const product = allProducts.find(p => p.codigo == code);
        addToCart(product);
        closeModal();
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // Buscador
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allProducts.filter(p => 
            p.nombre.toLowerCase().includes(term) || 
            p.categoria.toLowerCase().includes(term)
        );
        renderProducts(filtered);
    });

    // Iniciar
    loadProducts();

</script>

</body>
</html>
